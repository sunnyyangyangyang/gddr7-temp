# GPU offset tables for gddr7_temp driver.
# Each entry is one GPU model. device_id is the PCI Device ID (vendor is fixed 0x10de).
# All offset/stride fields accept hex strings or integers; gen_offsets.py normalises to int().

- device_id: 0x2b85
  name: "RTX 5090"
  dqr:
    module0: 0x009024C0
    vld_off: 0x10
    stride: 0x00004000
    num_modules: 8
  therm:
    ch0: 0x00AD0A90
    stride: 0x00000004
    num_channels: 6

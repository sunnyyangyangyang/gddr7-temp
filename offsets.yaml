# GPU offset tables for gddr7_temp driver.
# Each entry is one GPU model. device_id is the PCI Device ID (vendor is fixed 0x10de).
# All offset/stride fields accept hex strings or integers; gen_offsets.py normalises to int().
#
# VRAM sensor types:
#   VRAM_GDDR7_DQR — GDDR7 DQR MR-code (Blackwell)
#   VRAM_GDDR6_ADC — GDDR6 ADC 12-bit fixed-point, div by 32
# THERM sensor types:
#   THERM_BLACKWELL_BJT — bit30 valid, (raw & 0xFFFF)/256 °C
#   THERM_LEGACY_BYTE — (raw>>8)&0xFF >= 0x7F is invalid sentinel

- device_id: 0x2b85
  name: "RTX 5090"
  vram:
    type: VRAM_GDDR7_DQR
    module0: 0x009024C0
    vld_off: 0x10
    stride: 0x00004000
    num_modules: 8
  therm:
    type: THERM_BLACKWELL_BJT
    ch0: 0x00AD0A90
    stride: 0x00000004
    num_channels: 6

- device_id: 0x2684
  name: "RTX 4090"
  vram:
    type: VRAM_GDDR6_ADC
    module0: 0x009024C0
    vld_off: 0x10
    stride: 0x00004000
    num_modules: 18
  therm:
    type: THERM_LEGACY_BYTE
    ch0: 0x00AD0A90
    stride: 0x00000004
    num_channels: 6
